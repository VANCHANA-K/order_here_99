groups:
  - name: order-here-backend
    rules:
      - alert: OrderHereBackendHigh5xxErrorRateWarning
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{job="order-here-backend",status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count{job="order-here-backend"}[5m]))
          ) > 0.02
        for: 5m
        labels:
          severity: warning
          service: order-here-backend
        annotations:
          summary: Backend 5xx error rate is elevated
          description: 5xx ratio has exceeded 2% for 5 minutes.

      - alert: OrderHereBackendHigh5xxErrorRateCritical
        expr: |
          (
            sum(rate(http_server_requests_seconds_count{job="order-here-backend",status=~"5.."}[5m]))
            /
            sum(rate(http_server_requests_seconds_count{job="order-here-backend"}[5m]))
          ) > 0.05
        for: 5m
        labels:
          severity: critical
          service: order-here-backend
        annotations:
          summary: Backend 5xx error rate is critical
          description: 5xx ratio has exceeded 5% for 5 minutes.

      - alert: OrderHereBackendReadinessFailing
        expr: |
          probe_success{job="order-here-backend-readiness",instance="/health/ready"} == 0
        for: 2m
        labels:
          severity: critical
          service: order-here-backend
        annotations:
          summary: Backend readiness probe is failing
          description: /health/ready has been failing for 2 minutes.

      - alert: OrderHereBackendLivenessFailing
        expr: |
          probe_success{job="order-here-backend-liveness",instance="/health/live"} == 0
        for: 2m
        labels:
          severity: critical
          service: order-here-backend
        annotations:
          summary: Backend liveness probe is failing
          description: /health/live has been failing for 2 minutes.
